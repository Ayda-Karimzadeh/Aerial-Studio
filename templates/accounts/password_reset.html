{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}بازیابی رمز عبور{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="glass auth-card">
            <h3 class="section-title mb-3 text-center">بازیابی رمز عبور</h3>
            <p class="text-muted text-center mb-4">ایمیل خود را وارد کنید تا لینک بازیابی رمز عبور برایتان ارسال شود.</p>
            <form method="post" novalidate>
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-gradient btn-lg w-100 mt-3">ارسال لینک بازیابی</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
