{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}تغییر رمز عبور{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="glass auth-card">
            <h3 class="section-title mb-4 text-center">تغییر رمز عبور</h3>
            <form method="post" novalidate>
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-gradient btn-lg w-100 mt-3">به‌روزرسانی رمز عبور</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
