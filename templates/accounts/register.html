{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}ثبت‌نام{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="glass auth-card">
            <div class="text-center mb-4">
                <i class="fa-solid fa-feather-pointed navbar-brand-gradient fa-3x mb-3"></i>
                <h2 class="section-title">ثبت‌نام هنرجو</h2>
                <p class="text-muted">به خانواده Aerial Studio بپیوند.</p>
            </div>
            <form method="post" novalidate>
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-gradient btn-lg w-100 mt-3">ثبت‌نام</button>
            </form>
            <div class="text-center mt-4">
                <span class="text-muted small">قبلاً ثبت‌نام کرده‌اید؟ <a href="{% url 'accounts:login' %}" class="fw-bold" style="color: var(--color-primary);">وارد شوید</a></span>
            </div>
        </div>
    </div>
</section>
{% endblock %}
