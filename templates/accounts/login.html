{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}ورود{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="glass auth-card">
            <div class="text-center mb-4">
                <i class="fa-solid fa-feather-pointed navbar-brand-gradient fa-3x mb-3"></i>
                <h2 class="section-title">ورود به حساب کاربری</h2>
                <p class="text-muted">خوش برگشتی! برای ادامه وارد شوید.</p>
            </div>
            <form method="post" novalidate>
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-gradient btn-lg w-100 mt-3">ورود</button>
            </form>
            <div class="text-center mt-4">
                <a href="{% url 'accounts:password_reset' %}" class="text-muted small d-block mb-2">رمز عبور را فراموش کرده‌اید؟</a>
                <span class="text-muted small">حساب کاربری ندارید؟ <a href="{% url 'accounts:register' %}" class="fw-bold" style="color: var(--color-primary);">ثبت‌نام کنید</a></span>
            </div>
        </div>
    </div>
</section>
{% endblock %}
